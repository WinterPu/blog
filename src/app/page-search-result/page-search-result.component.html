<div >
  <div class="SearchTitle">
    <h1  class="text-white">Search {{page_title}}</h1>
  </div>

  <div *ngFor="let article of results">

    <div @SlideInOut class="container PreviewCard" (click)="onClick(article.index)">
      <div class="card mb-3" style="max-width: 100hv;">
        <!-- <div class="PostPreviewCardMask"></div> -->
        <div class="row no-gutters LowZIndex">
          <div class="col-md-12">
            <div class="card">
              <div class="card-header">{{article.title}}</div>
              <div class="card-body">

                <h5 class="card-title">{{article.title}}</h5>
                <p class="card-text">{{article.preview_description}}</p>
                <span class="Tag" *ngFor="let tag of article.tag"><span class="badge badge-primary">{{tag}}</span></span>

              </div>
              <div class="card-footer">{{preview_created_time}}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>
