<div *ngFor="let profolio of profolios; let i=index">

  <div @SlideInOut class="container PreviewCard" (click)="onClick(profolio.index)">
    <div class="card mb-3" style="max-width: 100hv;">
      <!-- <div class="PostPreviewCardMask"></div> -->

      <div class="row no-gutters LowZIndex">
        <div class="col-md-9">
          <div class="card">
            <div class="card-header">{{profolio.title}}</div>
            <div class="card-body">

              <h5 class="card-title">{{profolio.title}}</h5>
              <p class="card-text">{{profolio.preview_description}}</p>
              <p class="card-text"><small class="text-muted">{{profolio.created_time}}</small></p>

            </div>
            <div class="card-footer">{{profolio.updated_time}}</div>
          </div>
        </div>


        <div class="col-md-3 align-self-center">
            <img [src]="profolio_image_path_list[i]" class="card-img" alt="...">
        </div>
      </div>
    </div>
  </div>
</div>
